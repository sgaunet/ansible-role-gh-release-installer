---

gh_role_installer_version: "latest"
gh_role_installer_os: "linux"
gh_role_installer_arch: "amd64"
gh_role_installer_repository: "mozilla-ai/llamafile"
gh_role_installer_release: "https://github.com/{{ gh_role_installer_repository }}/releases/download/{{ version_to_install }}/llamafile-{{ version_to_install }}"
gh_role_installer_release_is_archive: false
gh_role_installer_binary_name: "llamafile"
gh_role_installer_cmd_to_get_version: "llamafile --version | awk '{ print $2 }' | sed 's/^v//'"
gh_role_installer_tmp_directory: "{{ lookup('env', 'TMPDIR') | default('/tmp', true) }}"
gh_role_installer_binary_path: "/usr/local/bin/{{ gh_role_installer_binary_name }}"
