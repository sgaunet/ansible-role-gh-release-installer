---

# gh_role_installer_version: "latest"
# gh_role_installer_os: "linux"
# gh_role_installer_arch: "amd64"
# gh_role_installer_repository: "sgaunet/jwt-cli"
# gh_role_installer_release: "https://github.com/{{ gh_role_installer_repository }}/releases/download/v{{ version_to_install }}/jwt-cli_{{ version_to_install }}_{{ gh_role_installer_os }}_{{ gh_role_installer_arch }}"
# gh_role_installer_release_is_archive: false
# gh_role_installer_binary_name: "jwt-cli"
# gh_role_installer_cmd_to_get_version: "jwt-cli version"
gh_role_installer_tmp_directory: "{{ lookup('env', 'TMPDIR') | default('/tmp', true) }}"
gh_role_installer_binary_path: "/usr/local/bin/{{ gh_role_installer_binary_name }}"

gh_role_installer_become: true

# Set to true when the release archive is a self-contained bundle (a wrapper
# script plus sibling binaries/libraries/assets that must stay together) rather
# than a single binary. When true, the whole archive is extracted to
# gh_role_installer_install_dir and gh_role_installer_binary_path is symlinked to
# the wrapper inside it. Defaults to false (single-binary install).
gh_role_installer_release_is_bundle: false
# Permanent destination for bundle installs (ignored unless _is_bundle is true).
gh_role_installer_install_dir: "/opt/{{ gh_role_installer_binary_name }}"
